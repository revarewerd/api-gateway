gateway {
  server {
    host = "0.0.0.0"
    host = ${?GATEWAY_HOST}
    port = 8080
    port = ${?GATEWAY_PORT}
  }

  jwt {
    secret = "change-me-in-production-use-env-var"
    secret = ${?JWT_SECRET}
    issuer = "wayrecall-auth"
    issuer = ${?JWT_ISSUER}
    expirationHours = 24
    expirationHours = ${?JWT_EXPIRATION_HOURS}
  }

  services {
    deviceManager {
      baseUrl = "http://localhost:8083"
      baseUrl = ${?DEVICE_MANAGER_URL}
      timeoutMs = 30000
    }
    authService {
      baseUrl = "http://localhost:8092"
      baseUrl = ${?AUTH_SERVICE_URL}
      timeoutMs = 30000
    }
  }

  cors {
    billingOrigin = "http://localhost:3001"
    billingOrigin = ${?CORS_BILLING_ORIGIN}
    monitoringOrigin = "http://localhost:3002"
    monitoringOrigin = ${?CORS_MONITORING_ORIGIN}
  }
}
