gateway {
  server {
    host = "0.0.0.0"
    host = ${?GATEWAY_HOST}
    port = 8080
    port = ${?GATEWAY_PORT}
  }

  jwt {
    secret = "change-me-in-production-use-env-var"
    secret = ${?JWT_SECRET}
    issuer = "wayrecall-auth"
    issuer = ${?JWT_ISSUER}
    expirationHours = 24
    expirationHours = ${?JWT_EXPIRATION_HOURS}
  }

  services {
    # ═══ Block 1 — Data Collection ═══════════════════════════════════════
    connectionManager {
      baseUrl = "http://localhost:10090"
      baseUrl = ${?CONNECTION_MANAGER_URL}
      timeoutMs = 10000
    }
    deviceManager {
      baseUrl = "http://localhost:10092"
      baseUrl = ${?DEVICE_MANAGER_URL}
      timeoutMs = 30000
    }
    historyWriter {
      baseUrl = "http://localhost:10091"
      baseUrl = ${?HISTORY_WRITER_URL}
      timeoutMs = 30000
    }

    # ═══ Block 2 — Business Logic ════════════════════════════════════════
    ruleChecker {
      baseUrl = "http://localhost:8093"
      baseUrl = ${?RULE_CHECKER_URL}
      timeoutMs = 30000
    }
    notificationService {
      baseUrl = "http://localhost:8094"
      baseUrl = ${?NOTIFICATION_SERVICE_URL}
      timeoutMs = 30000
    }
    analyticsService {
      baseUrl = "http://localhost:8095"
      baseUrl = ${?ANALYTICS_SERVICE_URL}
      timeoutMs = 60000  # Отчёты могут быть тяжёлыми — даём больше времени
    }
    userService {
      baseUrl = "http://localhost:8091"
      baseUrl = ${?USER_SERVICE_URL}
      timeoutMs = 30000
    }
    adminService {
      baseUrl = "http://localhost:8097"
      baseUrl = ${?ADMIN_SERVICE_URL}
      timeoutMs = 30000
    }
    integrationService {
      baseUrl = "http://localhost:8096"
      baseUrl = ${?INTEGRATION_SERVICE_URL}
      timeoutMs = 30000
    }
    maintenanceService {
      baseUrl = "http://localhost:8087"
      baseUrl = ${?MAINTENANCE_SERVICE_URL}
      timeoutMs = 30000
    }
    sensorsService {
      baseUrl = "http://localhost:8098"
      baseUrl = ${?SENSORS_SERVICE_URL}
      timeoutMs = 30000
    }

    # ═══ Block 3 — Presentation ══════════════════════════════════════════
    websocketService {
      baseUrl = "http://localhost:8090"
      baseUrl = ${?WEBSOCKET_SERVICE_URL}
      timeoutMs = 30000
    }
    authService {
      baseUrl = "http://localhost:8092"
      baseUrl = ${?AUTH_SERVICE_URL}
      timeoutMs = 30000
    }
  }

  cors {
    billingOrigin = "http://localhost:3001"
    billingOrigin = ${?CORS_BILLING_ORIGIN}
    monitoringOrigin = "http://localhost:3002"
    monitoringOrigin = ${?CORS_MONITORING_ORIGIN}
  }
}
